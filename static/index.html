<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workbench Lite</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Left sidebar: agents + channels -->
    <aside id="sidebar">
        <div class="sidebar-header">
            <h1>Workbench Lite</h1>
            <span id="connection-status" class="status-dot disconnected" title="Disconnected"></span>
        </div>

        <div class="sidebar-section">
            <div class="section-header">
                <h3>Agents</h3>
                <button id="btn-add-agent" class="btn-icon" title="Add Agent">+</button>
            </div>
            <ul id="agent-list"></ul>
            <button id="btn-add-reviewer" class="btn-link">+ Spawn Reviewer</button>
        </div>

        <div class="sidebar-section">
            <h3>Channels</h3>
            <ul id="channel-list"></ul>
        </div>

        <div class="sidebar-section">
            <h3>Activity</h3>
            <div id="sidebar-activity" class="sidebar-activity-btn" onclick="showActivityFeed()">
                Timeline
            </div>
        </div>
    </aside>

    <!-- Main content area -->
    <main id="main-content">
        <!-- Default: activity feed -->
        <div id="pane-activity" class="pane active">
            <div class="pane-header">
                <h2>Activity</h2>
            </div>
            <div id="activity-feed" class="message-pane"></div>
        </div>

        <!-- Agent DM pane -->
        <div id="pane-agent" class="pane">
            <div class="pane-header">
                <h2 id="agent-pane-name"></h2>
                <div class="pane-actions">
                    <button id="btn-agent-output" class="btn-sm">Terminal</button>
                    <button id="btn-agent-toggle" class="btn-sm">Stop</button>
                    <button id="btn-agent-delete" class="btn-sm btn-sm-danger">Delete</button>
                </div>
            </div>
            <div id="agent-stream" class="activity-stream"></div>
            <form id="form-agent-dm" class="compose-bar">
                <input type="text" id="agent-dm-input" placeholder="Message agent..." autocomplete="off">
                <button type="submit" class="btn-send">Send</button>
            </form>
        </div>

        <!-- Channel pane -->
        <div id="pane-channel" class="pane">
            <div class="pane-header">
                <h2 id="channel-pane-name"></h2>
            </div>
            <div id="channel-messages" class="message-pane"></div>
            <form id="form-channel-post" class="compose-bar">
                <input type="text" id="channel-input" placeholder="Post to channel..." autocomplete="off">
                <button type="submit" class="btn-send">Send</button>
            </form>
        </div>

        <!-- Terminal modal overlay -->
        <div id="terminal-overlay" class="overlay hidden">
            <div class="overlay-content">
                <div class="overlay-header">
                    <h3 id="terminal-title">Terminal</h3>
                    <button class="btn-close" onclick="closeTerminal()">&times;</button>
                </div>
                <pre id="terminal-output" class="terminal"></pre>
            </div>
        </div>
    </main>

    <!-- Add Agent Modal -->
    <div id="modal-add-agent" class="modal hidden">
        <div class="modal-content">
            <h2>Add Agent</h2>
            <form id="form-add-agent">
                <label>Name <input type="text" name="name" required placeholder="e.g., dev"></label>
                <label>Repository Path <input type="text" name="cwd" required placeholder="/path/to/repo"></label>
                <label>Role
                    <select name="role">
                        <option value="developer">Developer</option>
                        <option value="reviewer">Reviewer</option>
                        <option value="lead">Lead</option>
                        <option value="custom">Custom</option>
                    </select>
                </label>
                <label>Model
                    <select name="model">
                        <option value="sonnet">Sonnet</option>
                        <option value="opus">Opus</option>
                        <option value="haiku">Haiku</option>
                    </select>
                </label>
                <label>Prompt <textarea name="prompt" rows="4" placeholder="What should this agent do?"></textarea></label>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Spawn</button>
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
